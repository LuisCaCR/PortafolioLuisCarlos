<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card ISW-521 - Modelo de caja</title>
<style>
  
  * {
    box-sizing: border-box;   
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    padding: 20px;
  }

  
  .titulo-ejercicio {
    font-size: 17px;
    font-weight: bold;
    color: #1a2744;
    margin: 0 0 6px 16px;     /* alineado con el margin de la card */
  }

 
  .card {
    width: 500px;               /* ancho total exacto */
    margin: 16px;               /* espacio exterior  */
    border: 2px solid #d5dae2;  /* borde             */
    padding: 20px;              /* relleno interior  */
    background: #f0f2f5;        /* fondo gris claro  */
   
  }

  /* ===== Paso 4: encabezado azul marino ===== */
  .card-header {
    background: #1e3a5f;
    padding: 28px 30px;
  }
  .card-header h2 {
    color: #ffffff;
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  /* ===== Paso 5: barra dorada ===== */
  .barra {
    height: 6px;
    background: #f5b400;
    margin: 14px 0 18px;
  }

  /* ===== Paso 6: cuerpo con texto ===== */
  .card-body h3 {
    color: #1e3a5f;
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 16px;
  }
  .card-body p {
    color: #5b6573;
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 20px;
  }

  /* ===== Paso 7: botón ===== */
  .btn {
    display: block;
    background: #1e3a5f;
    color: #f5b400;
    text-align: center;
    padding: 14px;
    font-size: 15px;
    font-weight: bold;
    text-decoration: none;
  }
  .btn:hover { background: #163049; }

  /* ===== Leyenda del modelo de caja (pie) ===== */
  .leyenda {
    margin: 14px 0 0 16px;
    padding-top: 12px;
    border-top: 1px solid #e3e6ea;
    font-size: 13px;
    color: #555;
  }
  .leyenda .cuadro {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    vertical-align: middle;
    margin-right: 4px;
  }
  .sep { color: #c4c8cd; margin: 0 8px; }
</style>
</head>
<body>

  

  <div class="card">
    <div class="card-header">
      <h2>ISW-521</h2>
    </div>

    <div class="barra"></div>

    <div class="card-body">
      <h3>Programación en Ambiente Web I</h3>
      <p>Aprende a construir aplicaciones web modernas con HTML, CSS y JavaScript.</p>
      <a href="#" class="btn">Ver curso →</a>
    </div>
  </div>

</body>
</html>
